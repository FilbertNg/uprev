services:
  frontend2:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://backend2:8000
    environment:
      - NEXT_PUBLIC_API_URL=http://backend2:8000
    restart: unless-stopped

  backend2:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - server/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/uprev_main_db
    depends_on:
      db2:
        condition: service_healthy
    restart: unless-stopped

  db2:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uprev_main_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:


networks:
  stargaze-network:
    external: true
