services:
  frontend:
    image: nginx:alpine
    ports:
      - "3002:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./404.html:/usr/share/nginx/html/404.html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    restart: always
