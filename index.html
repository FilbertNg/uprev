<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - UpRev</title>
    <style>
        :root {
            --primary-color: #ff5722;
            /* Example accent color, can adjust if needed */
            --bg-color: #f9fafb;
            --text-color: #1f2937;
            --subtext-color: #6b7280;
        }

        body {
            /* Using system fonts for clean look if others not loaded */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        h1 {
            font-size: 8rem;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            /* Subtle gradient text */
            background: linear-gradient(135deg, #1f2937 0%, #4b5563 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.1;
            /* Make it a huge background element */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.5);
            z-index: -1;
            letter-spacing: -0.05em;
        }

        .content {
            position: relative;
            z-index: 1;
        }

        h2 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-color);
        }

        p {
            font-size: 1.125rem;
            color: var(--subtext-color);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            background-color: var(--text-color);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            /* Pill shape */
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* Animation */
        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .floating-element {
            display: inline-block;
            font-size: 4rem;
            animation: float 6s ease-in-out infinite;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <h1>404</h1>

    <div class="container">
        <div class="content">
            <div class="floating-element">🤔</div>
            <h2>Oops! Page not found.</h2>
            <p>We couldn't find the page you were looking for. It seems to have vanished into the digital void.</p>
            <a href="/" class="btn">Go Back Home</a>
        </div>
    </div>
</body>

</html>
